<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Comfydoe | Edit Lead</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #121415; color: #e2e2e3; font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-[#1a1c1d] p-10 rounded-xl w-full max-w-2xl border border-[#4c463b]/30 shadow-2xl">
        <h2 class="text-[#edd7a8] font-['Plus_Jakarta_Sans'] text-3xl font-bold mb-8">Edit Lead: {{ lead.full_name }}</h2>
        
        <form action="{{ url_for('edit_lead', id=lead.id) }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#cec5b7] uppercase tracking-widest">Full Name</label>
                    <input type="text" name="full_name" value="{{ lead.full_name }}" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#cec5b7] uppercase tracking-widest">Email</label>
                    <input type="email" name="email" value="{{ lead.email }}" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#cec5b7] uppercase tracking-widest">Service Type</label>
                    <select name="service" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
                        <option value="Consultancy" {% if lead.service == 'Consultancy' %}selected{% endif %}>Consultancy</option>
                        <option value="Logistics" {% if lead.service == 'Logistics' %}selected{% endif %}>Logistics</option>
                        <option value="Trade" {% if lead.service == 'Trade' %}selected{% endif %}>Import/Export</option>
                        <option value="Merchandise" {% if lead.service == 'Merchandise' %}selected{% endif %}>General Merchandise</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-[#cec5b7] uppercase tracking-widest">Status</label>
                    <select name="status" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
                        <option value="New" {% if lead.status == 'New' %}selected{% endif %}>New</option>
                        <option value="Processing" {% if lead.status == 'Processing' %}selected{% endif %}>Processing</option>
                        <option value="Qualified" {% if lead.status == 'Qualified' %}selected{% endif %}>Qualified</option>
                        <option value="Urgent" {% if lead.status == 'Urgent' %}selected{% endif %}>Urgent</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-2 text-[#cec5b7] uppercase tracking-widest">Message</label>
                <textarea name="message" rows="4" class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">{{ lead.message }}</textarea>
            </div>
            
            <div class="flex justify-end gap-4 mt-8">
                <a href="{{ url_for('admin_dashboard') }}" class="px-6 py-3 border border-[#4c463b] text-[#cec5b7] rounded font-bold hover:text-[#e2e2e3] transition-colors">Cancel</a>
                <button type="submit" class="px-6 py-3 bg-gradient-to-br from-[#edd7a8] to-[#d0bb8e] text-[#251a00] font-bold rounded shadow-lg hover:scale-[1.02] transition-transform">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</body>
</html>
