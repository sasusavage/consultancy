<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Comfydoe | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet"/>
    <style>
        body { background-color: #121415; color: #e2e2e3; font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-surface-container-low p-8 rounded-xl w-full max-w-sm border border-outline-variant/20 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-primary font-headline">Comfydoe</h1>
            <p class="text-sm text-on-surface-variant font-bold mt-1">Admin Console</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-3 rounded-lg text-sm font-bold {% if category == 'error' %}bg-error-container/30 text-error{% else %}bg-outline-variant/20 text-primary{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Username</label>
                <input type="text" name="username" required class="w-full bg-surface border border-outline-variant/30 rounded-lg text-on-surface p-3 focus:ring-1 focus:ring-primary/50">
            </div>
            <div>
                <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Password</label>
                <input type="password" name="password" required class="w-full bg-surface border border-outline-variant/30 rounded-lg text-on-surface p-3 focus:ring-1 focus:ring-primary/50">
            </div>
            <button type="submit" class="w-full mt-2 bg-primary text-on-primary-fixed font-bold p-3 rounded-lg hover:scale-[1.02] transition-transform">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
