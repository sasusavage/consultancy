{% extends "admin_base.html" %}
{% set active_nav = 'dashboard' %}
{% block title %}Edit Lead{% endblock %}

{% block header %}
<h2 class="text-lg font-bold font-headline text-primary">Edit Lead</h2>
{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <a href="{{ url_for('admin_dashboard') }}" class="inline-flex items-center gap-2 text-sm font-bold text-on-surface-variant hover:text-primary mb-6">
    <span class="material-symbols-outlined text-lg">arrow_back</span> Back to Leads
  </a>

  <div class="bg-surface-container rounded-xl p-6 lg:p-8">
    <h3 class="text-xl font-headline font-bold text-on-surface mb-6">{{ lead.full_name }}</h3>

    <form action="{{ url_for('edit_lead', id=lead.id) }}" method="POST" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Full Name</label>
          <input type="text" name="full_name" value="{{ lead.full_name }}" required
                 class="w-full bg-surface border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:ring-1 focus:ring-primary/50">
        </div>
        <div>
          <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Email</label>
          <input type="email" name="email" value="{{ lead.email }}" required
                 class="w-full bg-surface border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:ring-1 focus:ring-primary/50">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Service</label>
          <select name="service" required class="w-full bg-surface border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:ring-1 focus:ring-primary/50">
            {% for val, label in [('Consultancy','Consultancy'), ('Logistics','Logistics'), ('Trade','Import/Export'), ('Merchandise','General Merchandise')] %}
            <option value="{{ val }}" {% if lead.service == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Status</label>
          <select name="status" required class="w-full bg-surface border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:ring-1 focus:ring-primary/50">
            {% for s in ['New','Processing','Qualified','Urgent'] %}
            <option value="{{ s }}" {% if lead.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold mb-2 text-on-surface-variant uppercase tracking-widest">Message</label>
        <textarea name="message" rows="4" class="w-full bg-surface border border-outline-variant/30 rounded-lg p-3 text-on-surface focus:ring-1 focus:ring-primary/50">{{ lead.message }}</textarea>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <a href="{{ url_for('admin_dashboard') }}" class="px-5 py-2.5 border border-outline-variant/30 text-on-surface-variant rounded-lg font-bold hover:text-on-surface">Cancel</a>
        <button type="submit" class="px-5 py-2.5 bg-primary text-on-primary-fixed font-bold rounded-lg hover:scale-[1.02] transition-transform flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">save</span> Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
