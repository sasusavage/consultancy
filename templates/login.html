<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Comfydoe | Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #121415; color: #e2e2e3; font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-[#1a1c1d] p-8 rounded-xl w-full max-w-sm border border-[#4c463b]/30 shadow-2xl">
        <h2 class="text-[#edd7a8] font-['Plus_Jakarta_Sans'] text-2xl font-bold mb-6 text-center">Admin Access</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 text-sm font-bold {% if category == 'error' %}text-[#ffb4ab]{% else %}text-[#dac497]{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1 text-[#cec5b7]">Username</label>
                <input type="text" name="username" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 text-[#cec5b7]">Password</label>
                <input type="password" name="password" required class="w-full bg-[#121415] border border-[#4c463b]/50 rounded text-white p-3 focus:ring-1 focus:ring-[#edd7a8]">
            </div>
            <button type="submit" class="w-full mt-4 bg-gradient-to-br from-[#edd7a8] to-[#d0bb8e] text-[#251a00] font-bold p-3 rounded hover:scale-[1.02] transition-transform">
                Login
            </button>
        </form>
    </div>
</body>
</html>
